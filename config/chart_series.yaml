# Chart Series Catalog — Phase 1D
#
# Each entry maps a signal ID from the signals table to display metadata.
# Fields:
#   label      — human-readable name shown in the series selector and chart legend
#   signal_id  — matches signals.id in DuckDB (country.force.concept)
#   units      — display string for Y-axis label
#   value_col  — which column to plot: "value" (raw level) or "zscore"
#   default_pane — suggested pane grouping; series in the same pane share a Y-axis
#   group      — selector group header (mirrors lens name)
#   description — one-line tooltip in the series picker

# ── Master / GDP ──────────────────────────────────────────────────────────────
- label: "Real GDP Growth"
  signal_id: "us.master.gdp_real"
  units: "YoY %"
  value_col: value
  default_pane: growth
  group: "GDP & Activity"
  description: "Real GDP, year-over-year % change"

- label: "Nominal GDP Growth"
  signal_id: "us.master.gdp_nominal"
  units: "YoY %"
  value_col: value
  default_pane: growth
  group: "GDP & Activity"
  description: "Nominal GDP, year-over-year % change"

- label: "GDP Deflator"
  signal_id: "us.master.gdp_deflator"
  units: "YoY %"
  value_col: value
  default_pane: inflation
  group: "GDP & Activity"
  description: "GDP deflator (implicit price level), YoY %"

- label: "NGDP vs 10Y Spread"
  signal_id: "us.master.ngdp_minus_yield"
  units: "YoY % spread"
  value_col: value
  default_pane: policy
  group: "GDP & Activity"
  description: "Nominal GDP growth minus 10-year Treasury yield — positive = growth favours equities"

