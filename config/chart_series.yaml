# ── Yield Curve — term structure series (fetched by charting_data.py) ─────────
# These are NOT in the signals table; they are fetched directly from FRED cache.
# signal_id here is the FRED series ID, not a DuckDB signal ID.
# The charting app handles these via load_yield_curve_term_structure().
yield_curve_maturities:
  - label: "3-Month"
    fred_id: "DGS3MO"
    maturity_years: 0.25

  - label: "1-Year"
    fred_id: "DGS1"
    maturity_years: 1.0

  - label: "2-Year"
    fred_id: "DGS2"
    maturity_years: 2.0

  - label: "5-Year"
    fred_id: "DGS5"
    maturity_years: 5.0

  - label: "10-Year"
    fred_id: "DGS10"
    maturity_years: 10.0

  - label: "30-Year"
    fred_id: "DGS30"
    maturity_years: 30.0
