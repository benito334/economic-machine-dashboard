# Australia (AU) — Ray-recommended commodity/trade rollout 2026-07-07 (his #2 missing).
# The purest China-demand proxy in the developed world (iron ore, coal, LNG,
# gold). Live 10y + 3m rates, live monthly unemployment, BIS 3-sector credit.
# QUIRKS: CPI is QUARTERLY natively (AU has no monthly CPI); NO monthly IP on
# FRED -> growth reads on unemployment + trade. External debt null (high-income).
# All vintage_available: false. Equilibria in transformed units (yoy_pct -> decimal).

