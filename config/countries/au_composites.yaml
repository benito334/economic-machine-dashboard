# Australia composite indicator lists.
# Methodology params live in config/composites_policy.yaml.
# Tiers: PRIMARY (0.85-1.00) / STRONG (0.60-0.84) / CONTEXT (0.30-0.59) / VOLATILE (0.10-0.29).
# No monthly IP (AU has none free) -> growth on unemployment + trade. Two-signal rate basket. CPI is QUARTERLY native + IMF bridge.

growth_score:
  description: "AU growth-force composite"
  indicators:
    - id: growth.unemployment
      base_share: 0.7
      importance: 0.75
      quality_factor: 0.9
      invert: true
    - id: growth.exports_yoy
      base_share: 0.6
      importance: 0.6
      quality_factor: 0.85
    - id: growth.imports_yoy
      base_share: 0.5
      importance: 0.4
      quality_factor: 0.8

inflation_score:
  description: "AU inflation-force composite — CPI + IMF annual bridge"
  indicators:
    - id: inflation.cpi_headline
      base_share: 1.0
      importance: 0.95
      quality_factor: 0.90
    - id: inflation.cpi_imf_annual
      base_share: 0.5
      importance: 0.30
      quality_factor: 0.70

rate_score:
  description: "AU financial accommodation — 10y + 3m interbank"
  indicators:
    - id: policy.yield_10y
      base_share: 1.0
      importance: 0.9
      quality_factor: 1.0
      invert: true
    - id: policy.rate_3m_interbank
      base_share: 0.7
      importance: 0.36
      quality_factor: 0.95
      invert: true

credit_score:
  description: "AU credit health — BIS private credit + IMF gov debt"
  indicators:
    - id: credit.private_debt_gdp
      base_share: 1.0
      importance: 0.85
      quality_factor: 0.95
      invert: true
    - id: credit.gov_debt_gdp
      base_share: 0.7
      importance: 0.55
      quality_factor: 0.85
      invert: true

volatility_score:
  description: "AU market volatility — monthly-return proxy (single signal; low coverage)"
  indicators:
    - id: volatility.realized_vol
      base_share: 1.0
      importance: 0.90
      quality_factor: 0.70

productivity_score:
  description: "AU productivity trend — PWT TFP + R&D intensity (annual)"
  indicators:
    - id: growth.tfp
      base_share: 1.0
      importance: 0.85
      quality_factor: 0.75
      half_life_months: 12.0
    - id: growth.rnd_intensity
      base_share: 0.7
      importance: 0.50
      quality_factor: 0.70
      half_life_months: 12.0
