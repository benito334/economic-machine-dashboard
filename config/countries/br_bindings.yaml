# Brazil (BR) — Ray-recommended commodity/trade rollout 2026-07-07.
# Largest Latin-American economy, major commodity exporter (iron ore, soy,
# oil). Verified 2026-07-07: live IP (GYSAM), live discount rate (Selic-linked
# ~21%), BIS 3-sector credit, WB external debt fills ($605B). No OECD bond
# yield -> discount rate proxies the policy rate. Monthly CPI dead 2025-04 ->
# IMF annual bridge. Gini 50.3 = among the highest tracked (LatAm inequality).
# All vintage_available: false. Equilibria in transformed units (yoy_pct -> decimal).

country: BR

