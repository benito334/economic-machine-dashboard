# Canada (CA) — Ray-recommended commodity/trade rollout 2026-07-07 (his #1 missing).
# Resource-rich (oil sands, minerals, lumber), tightly linked to US cycles but
# BoC policy often diverges -> a North-American counter-balance. RICH data:
# live IP (GYSAM), live 10y + 3m rates (first EM/commodity 2-signal rate basket),
# live monthly unemployment, BIS 3-sector credit. External debt null (high-income).
# Monthly CPI dead 2025-03 -> IMF annual bridge.
# All vintage_available: false. Equilibria in transformed units (yoy_pct -> decimal).

