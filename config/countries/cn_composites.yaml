# China composite indicator lists.
# Methodology params live in config/composites_policy.yaml.
#
# ── Weight-setting principles (docs/Guidance/signal_weight_guidance.md) ──────
# These importance values are INFORMED PRIORS. GDP-regression calibration
# (indicators/calibrate.py) can revise them once enough history accumulates.
#
# Importance tiers:
#   PRIMARY   (0.85–1.00): non-redundant anchors; drive the composite
#   STRONG    (0.60–0.84): reliable supplementary; some correlation to primary
#   CONTEXT   (0.30–0.59): adds marginal info; volatile, lagging, or redundant
#   VOLATILE  (0.10–0.29): high noise or annual-only; included but not drivers
#
# Anti-redundancy rule: if [CORR AUDIT] flags two same-basket signals with
#   |r| > 0.80, the secondary signal's importance should be ≤40% of primary's.
# Force-balance rule: total weight mass (base_share × importance × quality_factor)
#   across growth signals should be within 33% of inflation basket mass.
#
# CN-specific notes:
#   - The only LIVE monthly growth reads are merchandise exports/imports
#     (OECD IP/retail/PMI feeds for China are all dead). Trade YoY is noisy
#     (Lunar New Year timing) — quality_factor reduced accordingly.
#   - exports and imports are correlated but carry different information
#     (external vs domestic demand); imports held at ≤55% of exports'
#     importance per the anti-redundancy rule.
#   - unemployment is an ILO-modeled ANNUAL estimate (VOLATILE tier).
#   - cpi_headline feed died 2025-04; the IMF annual bridge carries the
#     current read (same pattern as GB/JP).
#   - credit basket: private_debt_gdp is the anchor; household/corporate are
#     SUBSETS of private (would triple-count) and are ingested for the stage
#     classifier's sector votes, NOT weighted here. gov_debt adds the
#     sovereign side.

growth_score:
  description: "CN growth-force composite — monthly trade (live) + annual WB reads"
  indicators:
    - id: growth.exports_yoy
      base_share: 0.7
      importance: 0.80      # PRIMARY — strongest live monthly cyclical signal
      quality_factor: 0.80  # reduced: trade values are noisy (LNY timing, price effects)
    - id: growth.imports_yoy
      base_share: 0.6
      importance: 0.44      # CONTEXT — domestic-demand read; capped at 55% of exports (corr expected high)
      quality_factor: 0.80
    - id: growth.unemployment
      base_share: 0.5
      importance: 0.25      # VOLATILE — ILO-modeled annual estimate, heavily smoothed
      quality_factor: 0.70
      invert: true          # lower unemployment = better growth

inflation_score:
  description: "CN inflation-force composite — OECD monthly CPI (dead 2025-04) + IMF annual bridge"
  indicators:
    - id: inflation.cpi_headline
      base_share: 1.0
      importance: 0.95      # PRIMARY — only monthly price signal; long history (1987→)
      quality_factor: 0.90
    # Annual IMF bridge — carries the read now that the monthly feed is dead
    - id: inflation.cpi_imf_annual
      base_share: 0.5
      importance: 0.30      # VOLATILE — annual resolution; bridge only
      quality_factor: 0.70

# ── CN Financial Accommodation Score ─────────────────────────────────────────
# NOTE: single signal — no free government bond yield exists for China at any
# maturity. The 3m interbank rate is the PBoC-stance read. Low coverage;
# directional only.
rate_score:
  description: "CN financial accommodation — 3m interbank rate (single signal; low coverage)"
  indicators:
    - id: policy.rate_3m_interbank
      base_share: 1.0
      importance: 0.90      # PRIMARY — only available CN rate signal
      quality_factor: 1.00
      invert: true          # high rate = restrictive

# ── CN Credit Health Score ────────────────────────────────────────────────────
# private_debt_gdp (BIS total private) is the anchor. household/corporate are
# its components — excluded here to avoid triple-counting (they feed the stage
# classifier's sector votes instead). gov_debt_gdp adds the sovereign side.
credit_score:
  description: "CN credit health — BIS private credit + IMF gov debt (% GDP levels)"
  indicators:
    - id: credit.private_debt_gdp
      base_share: 1.0
      importance: 0.85      # PRIMARY — the defining China macro variable
      quality_factor: 0.95
      invert: true          # high debt/GDP = stress
    - id: credit.gov_debt_gdp
      base_share: 0.7
      importance: 0.55      # CONTEXT — annual only; LGFV debt hides in the corporate series
      quality_factor: 0.85
      invert: true

# ── CN Volatility Score ───────────────────────────────────────────────────────
# NOTE: single signal, monthly-return proxy (no free daily SSE/CSI index via
# FRED — see docs/Guidance/data_source_wishlist.md). Low coverage; directional only.
volatility_score:
  description: "CN market volatility — monthly-return proxy on share-price index (single signal; low coverage)"
  indicators:
    - id: volatility.realized_vol
      base_share: 1.0
      importance: 0.90      # PRIMARY — only available CN volatility signal
      quality_factor: 0.70  # reduced: monthly-resolution proxy, not true daily realized vol

# ── CN Productivity Trend Score ───────────────────────────────────────────────
# Two signals — better than KR/GB/JP (PWT TFP exists for China through 2023).
productivity_score:
  description: "CN productivity trend — PWT TFP + R&D intensity (annual)"
  indicators:
    - id: growth.tfp
      base_share: 1.0
      importance: 0.85      # PRIMARY — direct TFP measure (PWT, annual to 2023)
      quality_factor: 0.75  # reduced: annual, 2–3yr publication lag
      half_life_months: 12.0
    - id: growth.rnd_intensity
      base_share: 0.7
      importance: 0.50      # CONTEXT — input measure, not outcome
      quality_factor: 0.70
      half_life_months: 12.0
