# Indonesia (ID) — Ray-recommended commodity/trade rollout 2026-07-07 (his #4 missing).
# South-East Asia's biggest economy; major commodity exporter (coal, palm oil,
# nickel) and a demographic-dividend growth story. BIS 3-sector credit, WB
# external debt fills ($421B), FX reserves. QUIRKS: NO monthly IP and NO bond
# yield on FRED -> rate = call-money/interbank rate (live), growth on trade only.
# Monthly CPI dead 2025-04 -> IMF annual bridge. WB gov-revenue stale (2009) -> omitted.
# All vintage_available: false. Equilibria in transformed units (yoy_pct -> decimal).

country: ID

bindings:

  - id: master.gdp_real
    series_id: NGDPRNSAXDCIDQ
    provider: FRED
    frequency: Q
    force: master
    lead_lag: lagging
    transformation: yoy_pct
    units: yoy_pct
    country: ID
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 0.05
    linkage: "Indonesia real GDP YoY (quarterly). The headline growth clock."
    sanity_min: -0.25
    sanity_max: 0.25

