    frequency: A
    force: external
    lead_lag: leading
    transformation: level
    units: billions_usd
    raw_scale: 1.0e9
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 650.0
    linkage: "Total external debt stock, USD billions (WB debtor reporting system, fills for IN like CN). ~$716B ≈ 18% of GDP with $570B reserves against it — manageable."
    sanity_min: 0.0
    sanity_max: 3000.0

