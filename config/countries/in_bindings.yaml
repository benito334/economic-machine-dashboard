    series_id: BN.CAB.XOKA.GD.ZS
    provider: WorldBank
    frequency: A
    force: external
    lead_lag: leading
    transformation: level
    units: pct_gdp
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: -1.5
    linkage: "India current account balance % GDP. Structural mild deficit (oil imports vs services exports); beyond −3% historically marks rupee-stress episodes."
    sanity_min: -8.0
    sanity_max: 5.0

  - id: external.exports_gdp
    series_id: NE.EXP.GNFS.ZS
    provider: WorldBank
    frequency: A
    force: external
    lead_lag: coincident
    transformation: level
    units: pct_gdp
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 21.0
    linkage: "Exports of goods and services % GDP (~22%, services-heavy). India is less trade-dependent than East Asia — the domestic-demand story dominates."
    sanity_min: 5.0
    sanity_max: 40.0

  - id: external.imports_gdp
    series_id: NE.IMP.GNFS.ZS
    provider: WorldBank
    frequency: A
    force: external
    lead_lag: coincident
    transformation: level
    units: pct_gdp
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 23.0
    linkage: "Imports of goods and services % GDP. Energy imports are the swing factor — every $10/bbl adds ~0.4% of GDP to the import bill."
    sanity_min: 5.0
    sanity_max: 40.0

  - id: external.external_debt_bn
