    provider: IMF
    frequency: A
    force: fiscal
    lead_lag: lagging
    transformation: level
    units: pct_gdp
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: -2.5
    linkage: "India IMF general government primary balance % GDP (excl. interest). The r−g arithmetic works while nominal growth runs ~10% — the debt is outgrown, not repaid."
    sanity_min: -15.0
    sanity_max: 5.0

  - id: fiscal.govt_revenue_gdp
    series_id: GC.REV.XGRT.GD.ZS
    provider: WorldBank
    frequency: A
    force: fiscal
    lead_lag: lagging
    transformation: level
    units: pct_gdp
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 10.0
    linkage: "General government revenue % GDP (central basis, ~9.4%). One of the lowest tax takes of any major economy — the structural constraint on Indian state capacity."
    sanity_min: 3.0
    sanity_max: 30.0

