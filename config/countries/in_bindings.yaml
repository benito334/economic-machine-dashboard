    provider: IMF
    frequency: A
    force: credit
    lead_lag: leading
    transformation: level
    units: pct_gdp
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 75.0
    linkage: "India general government gross debt % GDP (IMF, center + states). Steady ~84% — high for an EM but domestically financed in local currency."
    sanity_min: 0.0
    sanity_max: 200.0

