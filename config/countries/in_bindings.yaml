# India (IN) indicator bindings — Phase 2
# Country code: IN (ISO 3166-1 alpha-2)
# All vintage_available: false — FRED vintages cover US only.
# Verified 2026-07-07. India is data-richer than China via free APIs:
#   - LIVE monthly industrial production (GYSAM YoY form → 2026-04)
#   - LIVE 10-year government bond yield (INDIRLTLT01STM → 2026-05) — China
#     has no free yield at any maturity; India does
#   - LIVE quarterly real GDP (NGDPRNSAXDCINQ, NSA → YoY transform)
#   - BIS 3-sector credit quarterly+live (private 102.3% / household 47.8% /
#     corporate 54.5% GDP from 2007) → private/sovereign two-vote stage split
#   - WB external debt fills ($716B, debtor-reporting country like CN)
#   - Monthly CPI (OECD COICOP) ages out 2025-03 → IMF annual bridge
#     (same cutoff pattern as KR/GB/CN)
#   - INR is NOT separately identified in COFER ("Other currencies") — no
#     reserve-currency-share slot, honest gap (KR pattern)
# Note: raw_scale: 100 converts already-YoY% series to decimal form.
# Equilibrium values in transformed units (yoy_pct → decimal).

country: IN

bindings:

  # ─── Master Synthesis ──────────────────────────────────────────────────────

  - id: master.gdp_real
    series_id: NGDPRNSAXDCINQ
    provider: FRED
    frequency: Q
    force: master
    lead_lag: lagging
    transformation: yoy_pct
    units: yoy_pct
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 0.065
    linkage: "India real GDP YoY (quarterly, NSA — YoY transform handles seasonality). The fastest-growing major economy; trend ~6.5–7%."
    sanity_min: -0.25
    sanity_max: 0.25

  - id: master.gdp_level_bn
    series_id: NGDPD
    provider: IMF
    frequency: A
    force: master
    lead_lag: lagging
    transformation: level
    units: billions_usd
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 4000.0
    linkage: "India nominal GDP in current USD billions (IMF). Now the world's ~4th-largest economy; used in the Global Overview size comparison."
    sanity_min: 200.0
    sanity_max: 20000.0

  # ─── Inflation ─────────────────────────────────────────────────────────────

  - id: inflation.cpi_headline
    series_id: CPALTT01INM659N
    provider: FRED
    frequency: M
    force: inflation
    lead_lag: coincident
    transformation: level
    units: yoy_pct
    raw_scale: 100
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 0.040
    linkage: "India CPI all items YoY (OECD COICOP, already % form). RBI target: 4% ± 2pp. Feed ends 2025-03 — bridged by the IMF annual signal."
    sanity_min: -0.05
    sanity_max: 0.30

  - id: inflation.cpi_imf_annual
    series_id: PCPIPCH
    provider: IMF
    frequency: A
    force: inflation
    lead_lag: coincident
    transformation: level
    units: yoy_pct
    raw_scale: 100
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: true
    verified: true
    equilibrium: 0.040
    linkage: "India CPI % change (IMF WEO annual). Bridge signal now that the monthly OECD feed is dead; 2025 read of 2.1% sits at the soft end of the RBI band."
    sanity_min: -0.05
    sanity_max: 0.30

  # ─── Growth (Demand & Output) ───────────────────────────────────────────────

  - id: growth.industrial_prod
    series_id: INDPRINTO01GYSAM
    provider: FRED
    frequency: M
    force: growth
    lead_lag: coincident
    transformation: level
    units: yoy_pct
    raw_scale: 100
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 0.050
    linkage: "India industrial production YoY (GYSAM form, live → 2026-04). The strongest live monthly output read — the index form died 2024-03, the YoY form survives (the recurring OECD-feed pattern)."
    sanity_min: -0.40
    sanity_max: 0.40

  - id: growth.exports_yoy
    series_id: XTEXVA01INM667S
    provider: FRED
    frequency: M
    force: growth
    lead_lag: coincident
    transformation: yoy_pct
    units: yoy_pct
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 0.08
    linkage: "India merchandise exports YoY (USD, seasonally adjusted). Services exports (IT) are the bigger story but have no free monthly feed; goods exports still track global demand."
    sanity_min: -0.50
    sanity_max: 0.80

  - id: growth.imports_yoy
    series_id: XTIMVA01INM667S
    provider: FRED
    frequency: M
    force: growth
    lead_lag: coincident
    transformation: yoy_pct
    units: yoy_pct
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: true
    verified: true
    equilibrium: 0.08
    linkage: "India merchandise imports YoY (USD). PROXY for domestic demand — oil-import cost swings dominate short-run moves; read alongside exports."
    sanity_min: -0.50
    sanity_max: 0.80

  - id: growth.unemployment
    series_id: SL.UEM.TOTL.ZS
    provider: WorldBank
    frequency: A
    force: growth
    lead_lag: lagging
    transformation: level
    units: pct_level
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: true
    verified: true
    equilibrium: 5.0
    linkage: "India unemployment rate (ILO modeled, annual). PROXY — vast informal employment makes any Indian unemployment rate a rough read; CMIE's monthly survey has no free API."
    sanity_min: 2.0
    sanity_max: 12.0

  - id: growth.rnd_intensity
    series_id: GB.XPD.RSDV.GD.ZS
    provider: WorldBank
    frequency: A
    force: growth
    lead_lag: structural
    transformation: level
    units: pct_gdp
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 0.7
    linkage: "R&D expenditure as % of GDP. At 0.65% far below China (2.6%) or Korea (5%) — the structural gap in the India-as-next-China thesis. WB series lags badly (last 2020)."
    sanity_min: 0.0
    sanity_max: 4.0

  - id: growth.tfp
    series_id: RTFPNAINA632NRUG
    provider: FRED
    frequency: A
    force: growth
    lead_lag: structural
    transformation: yoy_pct
    units: yoy_pct
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 0.015
    linkage: "India Total Factor Productivity YoY% (Penn World Tables, annual through 2023). Sustained TFP growth is what separates the India boom from a pure demographics story."
    sanity_min: -0.10
    sanity_max: 0.10

  # ─── Policy ────────────────────────────────────────────────────────────────

  - id: policy.yield_10y
    series_id: INDIRLTLT01STM
    provider: FRED
    frequency: M
    force: policy
    lead_lag: coincident
    transformation: level
    units: pct_level
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 7.0
    linkage: "India 10-year government bond yield (live → 2026-05, from 2011). RBI policy pass-through plus fiscal-supply premium; India has a free yield where China has none."
    sanity_min: 3.0
    sanity_max: 15.0

  # ─── Currency ──────────────────────────────────────────────────────────────

  - id: currency.reer
    series_id: RBINBIS
    provider: FRED
    frequency: M
    force: currency
    lead_lag: coincident
    transformation: level
    units: index_2020eq100
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 100.0
    linkage: "India real broad effective exchange rate (BIS, 2020=100). RBI manages the rupee against imported-inflation pass-through; sub-90 reads mark depreciation stress."
    sanity_min: 60.0
    sanity_max: 130.0

  # ─── Capital ───────────────────────────────────────────────────────────────

  - id: capital.fx_reserves_yoy
    series_id: TRESEGINM052N
    provider: FRED
    frequency: M
    force: capital
    lead_lag: leading
    transformation: yoy_pct
    units: yoy_pct
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 0.05
    linkage: "India FX reserves ex-gold YoY (IMF IFS, ~$570B stock). Drawdowns flag RBI defense of the rupee (2013 taper tantrum, 2022); the buffer is the external-stability anchor."
    sanity_min: -0.40
    sanity_max: 0.80

  - id: capital.fdi_net_inflows_gdp
    series_id: BX.KLT.DINV.WD.GD.ZS
    provider: WorldBank
    frequency: A
    force: capital
    lead_lag: leading
    transformation: level
    units: pct_gdp
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 1.5
    linkage: "FDI net inflows as % of GDP. The China-plus-one relocation flow in one number — currently modest (0.7%) relative to the narrative."
    sanity_min: -2.0
    sanity_max: 8.0

  # ─── Credit (BIS quarterly, from 2007) ─────────────────────────────────────

