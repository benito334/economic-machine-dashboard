    sanity_min: 30.0
    sanity_max: 90.0

  # ─── Volatility Force ──────────────────────────────────────────────────────
  # No free daily NIFTY/SENSEX via FRED — monthly OECD MEI share-price proxy
  # (EZ/KR/GB/CN pattern). See data_source_wishlist.md.

  - id: volatility.equity_index
    series_id: SPASTT01INM661N
    provider: FRED
    frequency: M
    force: volatility
    lead_lag: coincident
    transformation: level
    units: index_level
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 0.0
    linkage: "OECD MEI share price index for India (monthly, 2015=100, from 1957) — raw level, input to realized volatility only."
    sanity_min: 0.0
    sanity_max: 2000.0

  - id: volatility.realized_vol
    provider: derived
    frequency: M
    force: volatility
    lead_lag: coincident
    transformation: derived
    units: annualized_pct
    country: IN
    source_tier: free
    vintage_available: false
    is_constructed: true
    is_proxy: true
    verified: true
    equilibrium: 0.18
    linkage: "Annualized rolling std of monthly log returns on the India share-price index (12-month window) — monthly-resolution proxy for realized volatility."
    sanity_min: 0.0
    sanity_max: 2.0

  # ─── Lens J — Big-cycle ORDER ──────────────────────────────────────────────
  # INR is inside COFER's "Other currencies" bucket — no reserve-share slot
  # (honest gap, KR pattern).

  - id: order.gini
    series_id: SI.POV.GINI
    provider: WorldBank
    frequency: A
    force: order
    lead_lag: structural
    transformation: level
    units: index_level
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 30.0
    linkage: "Gini index (WB PIP, consumption-based for India — NOT directly comparable to income-based Ginis elsewhere; the 25.5 reading understates wealth concentration)."
    sanity_min: 15.0
    sanity_max: 60.0
    notes: "Only 5 observations (consumption survey years); last 2022 (25.5). India's income-based Gini from other sources is far higher — treat this as a within-India trend read only."
