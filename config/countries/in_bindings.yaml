    provider: FRED
    frequency: Q
    force: credit
    lead_lag: leading
    transformation: level
    units: pct_gdp
    country: IN
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 35.0
    linkage: "Credit to households, % GDP (BIS, from 2007). Rising fast off a low base — retail-credit boom is the newest leg of the Indian cycle."
