    sanity_min: 30.0
    sanity_max: 120.0

  - id: demo.labor_force_part_wb
    series_id: SL.TLF.CACT.ZS
    provider: WorldBank
    frequency: A
    force: demographics
    lead_lag: structural
    transformation: level
    units: pct_pop_15plus
    country: JP
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 62.0
    linkage: "ILO-modeled labor force participation rate (% population 15+). Rising female and elderly participation has offset ~half the demographic drag."
    sanity_min: 30.0
    sanity_max: 90.0

  # ─── Volatility Force ──────────────────────────────────────────────────────
  # NIKKEI225 is a FREE DAILY feed on FRED (unlike EZ/KR) — Japan gets the
  # US-style daily realized-vol treatment (21-day window, √252 annualization).

  - id: volatility.equity_index
    series_id: NIKKEI225
    provider: FRED
    frequency: D
    force: volatility
    lead_lag: coincident
    transformation: level
    units: index_level
    country: JP
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 0.0
    linkage: "Nikkei 225 daily close — raw level, used only as input to realized volatility."
    sanity_min: 0.0
    sanity_max: 100000.0
    notes: "Verified 2026-07-05: D, 1949-05→current. Daily — better than the EZ/KR monthly proxies."

  - id: volatility.realized_vol
    provider: derived
    frequency: D
    force: volatility
    lead_lag: coincident
    transformation: derived
    units: annualized_pct
    country: JP
    source_tier: free
    vintage_available: false
    is_constructed: true
    is_proxy: false
    verified: true
    equilibrium: 0.18
    linkage: "Annualized 21-day rolling standard deviation of daily Nikkei 225 log returns — true daily realized volatility, same construction as the US."
    sanity_min: 0.0
    sanity_max: 2.0

  # ─── Lens J — Big-cycle ORDER (roadmap Phase D pattern) ────────────────────

  - id: order.gini
    series_id: SI.POV.GINI
    provider: WorldBank
    frequency: A
    force: order
    lead_lag: structural
    transformation: level
    units: index_level
    country: JP
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 33.0
    linkage: "Gini index of income inequality — the internal-order read: widening wealth gaps precede internal political stress and populist policy shifts."
    sanity_min: 20.0
    sanity_max: 60.0
    notes: "World Bank Poverty & Inequality Platform, JPN. Verified 2026-07-05: annual through 2020 (32.3). Multi-year lag inherent — slow structural read."

  - id: order.reserve_currency_share
    series_id: "IMF.STA,COFER/G001.AFXRA.CI_JPY.SHRO_PT.Q"
    provider: IMF_SDMX
    frequency: Q
    force: order
    lead_lag: structural
    transformation: level
    units: pct_level
    country: JP
    source_tier: free
    vintage_available: false
    is_proxy: false
    verified: true
    equilibrium: 5.0
    linkage: "JPY share of allocated global FX reserves (IMF COFER) — the external-order read: the yen's #3 reserve status underpins Japan's borrowing privilege despite the debt stock."
    sanity_min: 1.0
    sanity_max: 15.0
    notes: "Verified 2026-07-05: quarterly 1999-Q1 → 2026-Q1 (5.4%)."
