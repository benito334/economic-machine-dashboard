# South Korea composite indicator lists.
# Methodology params live in config/composites_policy.yaml.
#
# ── Weight-setting principles (docs/Guidance/signal_weight_guidance.md) ──────
# These importance values are INFORMED PRIORS. Phase 3B (indicators/calibrate.py)
# will replace them with back-tested, cross-validated values.
#
# Importance tiers:
#   PRIMARY   (0.85–1.00): non-redundant anchors; drive the composite
#   STRONG    (0.60–0.84): reliable supplementary; some correlation to primary
#   CONTEXT   (0.30–0.59): adds marginal info; volatile, lagging, or redundant
#   VOLATILE  (0.10–0.29): high noise or annual-only; included but not drivers
#
# Anti-redundancy rule: if [CORR AUDIT] flags two same-basket signals with
#   |r| > 0.80, the secondary signal's importance should be ≤40% of primary's.
# Force-balance rule: total weight mass (base_share × importance × quality_factor)
#   across growth signals should be within 33% of inflation basket mass.
#
# KR-specific notes:
#   - Signal coverage is narrow vs US/EZ; weights reflect higher per-signal reliance.
#   - cpi_core is the primary anchor. cpi_headline is correlated (r~0.88) and
#     has been reduced to CONTEXT tier to avoid double-counting.
#   - unemployment is a lagging indicator for Korea; reduced to CONTEXT tier.
#   - cpi_imf_annual is a bridge signal only (annual, is_proxy=true); VOLATILE tier.

growth_score:
  description: "KR growth-force composite — FRED/WB monthly indicators"
  indicators:
    - id: growth.industrial_prod
      base_share: 0.7
      importance: 0.80      # PRIMARY — strongest coincident output signal for Korea; base_share raised for balance
      quality_factor: 0.95
    - id: growth.retail_sales
      base_share: 0.65
      importance: 0.75      # STRONG — consumer demand; base_share raised to compensate for narrow signal set
      quality_factor: 0.95
    - id: growth.unemployment
      base_share: 0.5
      importance: 0.45      # CONTEXT — lagging indicator; reduced from 0.55 per guidance
      quality_factor: 0.90
      invert: true          # lower unemployment = better growth

inflation_score:
  description: "KR inflation-force composite — FRED/WB CPI + IMF annual bridge"
  indicators:
    - id: inflation.cpi_core
      base_share: 1.0
      importance: 0.95      # PRIMARY — primary inflation anchor for Korea
      quality_factor: 1.00
    - id: inflation.cpi_headline
      base_share: 1.0
      importance: 0.45      # CONTEXT — correlated with cpi_core (r~0.88); reduced from 0.60
      quality_factor: 0.90
    # Annual IMF bridge — activates when monthly signals are stale (post-Apr 2025)
    - id: inflation.cpi_imf_annual
      base_share: 0.5
      importance: 0.30      # VOLATILE — annual resolution limits precision; bridge only
      quality_factor: 0.70

# ── KR Financial Accommodation Score ─────────────────────────────────────────
# NOTE: KR has only one rate signal. Score will have low coverage — treat as
# directional indicator only, not a robust composite.
rate_score:
  description: "KR financial accommodation — 10y yield (single signal; low coverage)"
  indicators:
    - id: policy.yield_10y
      base_share: 1.0
      importance: 0.90      # PRIMARY — only available KR rate signal
      quality_factor: 1.00
      invert: true          # high yield = restrictive

# ── KR Credit Health Score ────────────────────────────────────────────────────
# NOTE: KR has only one credit signal. Score will have low coverage.
credit_score:
  description: "KR credit health — govt debt/GDP (single signal; low coverage)"
  indicators:
    - id: credit.gov_debt_gdp
      base_share: 1.0
      importance: 0.90      # PRIMARY — only available KR credit signal
      quality_factor: 1.00
      invert: true          # high debt/GDP = stress
