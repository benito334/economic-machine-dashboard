# Mexico (MX) — Ray-recommended commodity/trade rollout 2026-07-07 (his #3 missing).
# The nearshoring / US-trade story in one economy; major manufacturing hub and
# oil exporter. Live 10y + 3m rates, BIS 3-sector credit, WB external debt fills
# ($591B). QUIRKS: NO monthly IP and NO live monthly unemployment on FRED ->
# growth reads on merchandise trade only (thin, CN-like). Monthly CPI dead
# 2024-07 -> IMF annual bridge.
# All vintage_available: false. Equilibria in transformed units (yoy_pct -> decimal).

