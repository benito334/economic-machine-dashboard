# US composite indicator lists — which signals enter Growth and Inflation scores.
# Methodology params (weights, decay, confidence) live in config/composites_policy.yaml.
#
# `importance` is the primary tunable judgement setting (0–1).
# Nominal raw weight = base_share × importance × quality_factor, then normalized to 1.0
# within each basket at runtime. Indicators with is_stale=true or low_history=true are
# excluded at runtime.
# invert: true  → multiply Z-score by -1 before averaging (lower raw = better)
#
# ── Weight-setting principles (docs/Guidance/signal_weight_guidance.md) ──────
# These importance values are INFORMED PRIORS. Phase 3B (indicators/calibrate.py)
# will replace them with back-tested, cross-validated values.
#
# Importance tiers:
#   PRIMARY   (0.85–1.00): non-redundant anchors; drive the composite
#   STRONG    (0.60–0.84): reliable supplementary; some correlation to primary
#   CONTEXT   (0.30–0.59): adds marginal info; volatile, lagging, or redundant
#   VOLATILE  (0.10–0.29): high noise or annual-only; included but not drivers
#
# Anti-redundancy rule: if [CORR AUDIT] flags two same-basket signals with
#   |r| > 0.80, the secondary signal's importance should be ≤40% of primary's.
# Force-balance rule: total weight mass (base_share × importance × quality_factor)
#   across growth signals should be within 33% of inflation basket mass.
#
# US-specific notes:
#   - pce_core is the Fed's mandate measure; cpi_core is correlated (r~0.92) but
#     not independent. Reduced cpi_core to STRONG tier to avoid double-counting.
#   - breakeven_5y and breakeven_10y are correlated (r~0.90); merged into inflation.breakeven_avg
#     (see 2026-07-05 Ray Dalio review) rather than keeping both as separate composite slots.
#   - unemployment is lagging; reduced from 0.55 to 0.45 per guidance hierarchy.

growth_score:
  description: "Group-weighted Z-score composite of growth-force coincident/leading signals"
  # ── 2026-07-05: GDP-regression calibration applied (indicators/calibrate.py) ──
  # Per the Ray Dalio review (docs/Guidance/ray_dalio_review_log.md #1), reduce
  # collective weight of labor-market-cluster signals vs. output/demand, via the
  # existing calibration tool rather than hand-tuning. OLS of each signal's Z-score
  # against us.master.gdp_real Z-score; recommended_imp scaled to [0.10, 0.95].
  # Applied to all 9 original cyclical signals (beta > 0 in all cases); NOT applied
  # to the 3 productivity-trend signals below since they're deliberately structural/
  # long-run and evaluating them against short-run GDP fit would defeat their purpose.
  indicators:
    - id: growth.payrolls
      base_share: 0.5
      importance: 0.64      # was 0.90 — GDP-regression: beta=0.82, R²=0.64, n=181
      quality_factor: 0.95
    - id: growth.industrial_prod
      base_share: 0.5
      importance: 0.66      # was 0.80 — GDP-regression: beta=0.85, R²=0.73, n=181
      quality_factor: 0.95
    - id: growth.retail_sales
      base_share: 0.5
      importance: 0.67      # was 0.75 — GDP-regression: beta=0.85, R²=0.61, n=133
      quality_factor: 0.95
    - id: growth.real_pce
      base_share: 0.4
      importance: 0.95      # was 0.65 — GDP-regression: beta=1.21, R²=0.88, n=73 (highest fit)
      quality_factor: 0.95
    - id: growth.capacity_util
      base_share: 0.5
      importance: 0.45      # was 0.65 — GDP-regression: beta=0.57, R²=0.35, n=181
      quality_factor: 0.90
    - id: growth.job_openings
      base_share: 0.5
      importance: 0.25      # was 0.85 — GDP-regression: beta=0.32, R²=0.12, n=102 (weak fit; largest cut)
      quality_factor: 0.95
    - id: growth.pmi_proxy
      base_share: 0.5
      importance: 0.49      # was 0.80 — GDP-regression: beta=0.63, R²=0.32, n=181
      quality_factor: 0.95
    - id: growth.labor_force_part
      base_share: 0.4
      importance: 0.10      # was 0.60 — GDP-regression: beta=0.13, R²=0.02, n=181 (not significant, p=0.078)
      quality_factor: 0.90
    - id: growth.unemployment
      base_share: 0.5
      importance: 0.25      # was 0.45 — GDP-regression: beta=0.32, R²=0.10, n=181
      quality_factor: 0.90
      invert: true          # lower unemployment = better growth
    # ── Long-run productivity trend (added 2026-07-05, Ray Dalio review #7) ──
    # Ray: the cyclical basket above has no explicit "trend-growth" component;
    # his framework treats productivity growth as one of the 3 big forces (distinct
    # from the short-term debt cycle these cyclical signals mostly capture).
    # Modest weights: these are slow-moving/annual structural signals, not drivers.
    - id: growth.productivity
      base_share: 0.4
      importance: 0.35      # CONTEXT — quarterly labor productivity; most timely of the 3 trend signals
      quality_factor: 0.90
    - id: growth.tfp
      base_share: 0.3
      importance: 0.20      # VOLATILE — annual TFP; slow-moving secular trend
      quality_factor: 0.85
    - id: growth.rnd_intensity
      base_share: 0.3
      importance: 0.15      # VOLATILE — annual R&D/GDP; structural driver of future productivity, not current growth
      quality_factor: 0.85

inflation_score:
  description: "Weighted Z-score composite of inflation-force signals"
  indicators:
    - id: inflation.pce_core
      base_share: 1.0
      importance: 0.95      # PRIMARY — Fed mandate measure; non-redundant anchor
      quality_factor: 1.00
    - id: inflation.cpi_core
      base_share: 1.0
      importance: 0.65      # STRONG — correlated with pce_core (r~0.92); reduced from 0.95
      quality_factor: 1.00
    - id: inflation.wages
      base_share: 0.5
      importance: 0.30      # CONTEXT — adds wage-push signal; services persistence
      quality_factor: 0.85
    - id: inflation.breakeven_avg
      base_share: 0.5
      importance: 0.30      # CONTEXT — blended 5Y/10Y market-based expectations; forward-looking.
                             # Ray Dalio review 2026-07-05 (docs/Guidance/ray_dalio_review_log.md #2):
                             # replaces separate breakeven_5y (0.25) + breakeven_10y (0.20) slots,
                             # which double-counted the same expectations channel (r~0.90 correlated).
                             # Both raw signals still exist individually for drill-down; only the
                             # blended signal feeds the composite now.
      quality_factor: 0.90
    - id: inflation.cpi_headline
      base_share: 0.5
      importance: 0.20      # VOLATILE — largely captured by pce_core; kept for breadth
      quality_factor: 0.90
    - id: inflation.crude_oil
      base_share: 0.5
      importance: 0.10      # VOLATILE — energy pass-through; extreme noise
      quality_factor: 0.85
    - id: inflation.ppi_broad
      base_share: 0.5
      importance: 0.30      # CONTEXT — upstream cost-push; leads CPI by 2-3 months
      quality_factor: 0.90

# ── Financial Accommodation Score ────────────────────────────────────────────
# Positive = accommodative / loose conditions; Negative = restrictive / tight.
# All six signals are rate levels — invert:true so that rising rates reduce the
# accommodation score. Default importances match the user-defined tier table
# (see Methodology Section 6 — Interest Rate basket defaults).
#
# Basket focuses on the pure policy-rate term structure. Yield-curve slopes and
# credit spreads (premium.*) are not included here; they are structural signals
# with different information content and may be added to credit_score separately.
rate_score:
  description: "Financial accommodation composite — Fed policy rates and nominal/real term structure"
  indicators:
    - id: policy.fed_funds_target
      base_share: 1.0
      importance: 0.95      # PRIMARY — direct policy instrument; immediately sets short-term discount rate
      quality_factor: 1.00
      half_life_months: 3.0 # policy anchor; discrete FOMC jumps make old readings quickly stale
      invert: true          # higher target rate = more restrictive
    - id: policy.real_yield_10y
      base_share: 1.0
      importance: 0.90      # PRIMARY — long-run real rate; key driver of long-duration asset valuation
      quality_factor: 1.00
      half_life_months: 6.0 # long-end real rate; structurally slow-moving; less volatile than short end
      invert: true          # high real 10y yield = tight long-end conditions
    - id: policy.fed_funds
      base_share: 1.0
      importance: 0.88      # PRIMARY — first observable price of policy lever; embeds risk premia
      quality_factor: 1.00
      half_life_months: 3.0 # tracks fed_funds_target closely; equally reactive to policy decisions
      invert: true          # higher effective rate = restrictive
    - id: policy.real_fed_funds
      base_share: 0.7
      importance: 0.75      # STRONG — removes inflation expectations; pure discount-rate perspective
      quality_factor: 1.00
      half_life_months: 3.0 # derived from short-term nominal rate and inflation; same fast cadence
      invert: true          # high real rate = restrictive; second lens on same force
    - id: policy.yield_2y
      base_share: 0.7
      importance: 0.70      # STRONG — market forward-pricing of policy rate; leads tightening cycles
      quality_factor: 0.95
      half_life_months: 4.0 # forward-prices 2 years out; slightly smoother than overnight rate
      invert: true          # rising 2y yield = market pricing in more tightening
    - id: policy.yield_10y
      base_share: 0.5
      importance: 0.45      # CONTEXT — highly correlated with real_yield_10y; limited incremental info
      quality_factor: 0.90
      half_life_months: 6.0 # long-end nominal; less volatile than short-end; same cadence as real_yield_10y
      invert: true          # higher nominal 10y = restrictive long-end conditions

# ── Credit Health Score ───────────────────────────────────────────────────────
# Positive = healthy/expanding credit; Negative = stressed/contracting.
# Debt burden and tightening signals are inverted: rising = worse health.
# Default importances match the user-defined tier table
# (see Methodology Section 7 — Credit basket defaults).
credit_score:
  description: "Credit health composite — loan growth, lending standards, debt burden signals"
  indicators:
    - id: credit.bank_loans
      base_share: 1.0
      importance: 0.90      # PRIMARY — most direct gauge of credit growth/contraction; drives short-term debt cycle
      quality_factor: 1.00
      half_life_months: 3.0 # monthly flow signal; fast-moving; default global half-life
      # no invert: rising loans YoY = healthy credit expansion
    - id: credit.lending_standards
      base_share: 0.7
      importance: 0.75      # STRONG — leading indicator; tightening precedes loan slowdown
      quality_factor: 1.00
      half_life_months: 4.0 # quarterly (SLOOS) but fast-moving cycle indicator
      invert: true          # net tightening = worse credit health (SLOOS: positive = tighter)
    - id: credit.corporate_debt
      base_share: 0.7
      importance: 0.65      # STRONG — flow signal; YoY growth in nonfinancial corporate debt; leads cycle turns
      quality_factor: 0.90
      half_life_months: 4.0 # quarterly flow signal; fast-moving; tracks the short-term debt cycle
      invert: true          # rapid debt accumulation = rising leverage risk (STRONG; complements bank_loans)
    - id: credit.debt_service_ratio
      base_share: 0.5
      importance: 0.45      # CONTEXT — burden of servicing existing debt; stress signal
      quality_factor: 0.95
      half_life_months: 6.0 # quarterly stock-ish measure; slow to move; 2 release cycles = still fresh
      invert: true          # rising DSR = more income diverted to debt = stress
    - id: credit.household_debt_gdp
      base_share: 0.5
      importance: 0.40      # CONTEXT — stock measure of leverage; slow-moving sustainability signal
      quality_factor: 0.90
      half_life_months: 9.0 # quarterly BIS series; structural, slow-moving; retains 50% weight after 3 quarters
      invert: true          # high household debt/GDP = limits future borrowing capacity
    - id: credit.corporate_debt_gdp
      base_share: 0.5
      importance: 0.40      # CONTEXT — stock measure of corporate leverage; slow-moving sustainability signal
      quality_factor: 0.90
      half_life_months: 9.0 # quarterly BIS series; structural, slow-moving; same cadence as household_debt_gdp
      invert: true          # high corporate debt/GDP = elevated refinancing risk
    - id: credit.gov_debt_gdp
      base_share: 0.3
      importance: 0.20      # VOLATILE — background signal; less volatile than private measures
      quality_factor: 0.85
      half_life_months: 12.0 # annual signal; retains 50% weight after 4 quarters (one full release cycle)
      invert: true          # high govt debt = less fiscal space to support credit

# ── Volatility Score (added 2026-07-05, Ray Dalio review #13) ────────────────
# Positive = higher volatility / more risk-off environment.
# Ray: Volatility should NOT feed the Growth/Inflation regime label directly —
# it's a modifier/overlay (see regime classifier algorithm), but is still
# computed as its own basket composite like every other force for consistency.
volatility_score:
  description: "Market volatility composite — realized equity vol + VIX (US-only bonus weight)"
  indicators:
    - id: volatility.realized_vol
      base_share: 1.0
      importance: 0.70      # STRONG — universal, country-agnostic signal
      quality_factor: 0.90
      half_life_months: 3.0 # daily signal; fast-moving
    - id: volatility.vix
      base_share: 0.7
      importance: 0.90      # PRIMARY — forward-looking (implied vol), US-only bonus weight
      quality_factor: 1.00
      half_life_months: 3.0
