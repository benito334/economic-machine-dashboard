# Long-Term Debt-Cycle STAGE Classifier — configuration (roadmap Phase C)
# ─────────────────────────────────────────────────────────────────────────────
# Debt Stress (longterm_stress.yaml) gives a LEVEL; this classifier gives a
# STAGE — where in the ~50–75yr long-term debt cycle the country sits, in the
# Ray Dalio framing:
#
#   leveraging     early/mid — debt growing but productively: debt/GDP rising,
#                  debt service manageable, growth above the real rate,
#                  nominal growth above yields (burdens erode as they grow)
#   squeeze        the top — debt-service squeeze: debt stock high, debt
#                  service rising, real rate at/above real growth, nominal
#                  growth below yields (burdens compound)
#   deleveraging   the bust — debt/GDP falling, debt service unwinding from a
#                  high, growth weak
#   reflation      "beautiful deleveraging" — policy engineered so nominal
#                  growth runs well above yields and the real rate sits well
#                  below real growth while the debt stock stabilizes/falls
#   neutral        no stage clears min_score — the features genuinely disagree
#
# Classification is a transparent weighted-condition vote per stage (argmax),
# NOT a fitted model: every threshold and weight is in this file. Parameters
# marked # TUNABLE encode modelling judgements; Phase G3 backtesting against
# named episodes (2008 GFC deleveraging, 2010s reflation, 2022 squeeze) is the
# intended calibration loop.
# ─────────────────────────────────────────────────────────────────────────────

features:
  # Annualized slope window for debt/GDP trajectory (pp of GDP per year).
  # TUNABLE: shorter → reacts to credit impulses; longer → structural read.
  debt_traj_window_years: 3

  # Debt-service-ratio trend window (pp change over the window).
  # TUNABLE: 2y captures a hiking cycle passing through to debt service.
  dsr_trend_window_years: 2

  # Minimum quarterly observations before the expanding debt/GDP percentile
  # is emitted. Percentiles use only data through t-1 (shift 1) — no look-ahead.
  # TUNABLE: raising discards more early history but stabilizes the percentile.
  percentile_min_periods: 20

  # Annual series (World Bank/IMF debt ratios) are forward-filled onto the
  # quarterly grid at most this many quarters — beyond it the feature goes
  # missing rather than silently carrying stale data (CLAUDE.md rule 7).
  ffill_limit_quarters: 5

  # Smoothing on real growth and inflation inputs before r−g / ngdp−yield are
  # formed (trailing mean, quarters). 1 = no smoothing.
  # TUNABLE: 4 dampens single-quarter GDP noise from flipping the stage.
  growth_smooth_quarters: 4

thresholds:              # all in percentage points unless noted
  debt_pct_high: 0.70    # TUNABLE percentile above which the debt stock is "high"
  debt_traj_rising: 1.0  # TUNABLE pp/yr — debt/GDP rising materially
  debt_traj_falling: -0.5 # TUNABLE pp/yr — actively deleveraging
  dsr_rising: 0.3        # TUNABLE pp over the trend window
  dsr_falling: -0.3      # TUNABLE
  r_minus_g_pos: 0.0     # TUNABLE r ≥ g — the "debt grows faster than income" line
  r_minus_g_deep_neg: -1.0 # TUNABLE r well below g — reflation-engineered
  ngdp_yield_pos: 0.5    # TUNABLE nominal growth comfortably above yields
  ngdp_yield_neg: -0.5   # TUNABLE nominal growth below yields — burdens compound
  growth_weak: 1.0       # TUNABLE real growth (yoy %) below this = weak

# Condition weights per stage. Each stage's score = Σ weight × condition,
# renormalized over the conditions whose features are AVAILABLE that quarter
# (a country with no debt-service series still gets a stage from the rest).
# TUNABLE: weights encode which evidence matters most for each stage.
weights:
  leveraging:
    debt_rising: 0.30            # debt_traj > debt_traj_rising
    dsr_not_rising: 0.20         # dsr_trend ≤ dsr_rising
    g_above_r: 0.30              # r_minus_g < r_minus_g_pos
    ngdp_above_yield: 0.20       # ngdp_minus_yield > 0
  squeeze:
    debt_high: 0.30              # debt_pct > debt_pct_high
    dsr_rising: 0.30             # dsr_trend > dsr_rising
    r_at_or_above_g: 0.25        # r_minus_g ≥ r_minus_g_pos
    ngdp_below_yield: 0.15       # ngdp_minus_yield < ngdp_yield_neg
  deleveraging:
    debt_falling: 0.40           # debt_traj < debt_traj_falling
    dsr_falling: 0.25            # dsr_trend < dsr_falling
    growth_weak: 0.20            # real growth < growth_weak
    ngdp_below_yield: 0.15
  reflation:
    debt_not_rising: 0.25        # debt_traj ≤ debt_traj_rising
    r_deep_below_g: 0.35         # r_minus_g < r_minus_g_deep_neg
    ngdp_well_above_yield: 0.30  # ngdp_minus_yield > ngdp_yield_pos
    dsr_falling: 0.10

classification:
  # A stage must clear this score to be labeled; otherwise "neutral".
  # TUNABLE: raise for fewer, higher-conviction labels.
  min_score: 0.45

  # A stage's conditions must have at least this much of their weight
  # evaluable (features present) or that stage scores NaN that quarter.
  min_condition_weight: 0.50

  # At least this many of the 5 feature families (debt level, debt trajectory,
  # DSR trend, r−g, ngdp−yield) must be present or no label is emitted.
  min_features: 3

  # Rolling-mode smoothing of the raw label (quarters). Prevents single-quarter
  # flapping between adjacent stages. 1 = no smoothing.
  # TUNABLE: 3 requires a stage to persist ~2 of 3 quarters to take over.
  smoothing_quarters: 3

# ── Per-country feature bindings ─────────────────────────────────────────────
# Signal IDs are concept tails (country prefix added at runtime). Missing
# blocks degrade gracefully: the classifier runs on whatever is present.
# Unit conventions handled in code: yields/rates are pct_level (2.5 = 2.5%);
# gdp_real & cpi are yoy decimal fractions (0.026 = 2.6%); debt ratios are
# pct of GDP (122.8); us.master.ngdp_minus_yield is a decimal spread (0.016).
countries:
  US:
    debt_components:             # averaged per-component (different start dates)
      - credit.gov_debt_gdp
      - credit.household_debt_gdp
      - credit.corporate_debt_gdp
    dsr_signal: credit.debt_service_ratio
    real_rate:
      signal: policy.real_fed_funds        # already real, pct_level
    real_growth_signal: master.gdp_real
    ngdp_minus_yield:
      signal: master.ngdp_minus_yield
      scale: 100                            # decimal spread → pp
  EZ:
    debt_components:
      - credit.gov_debt_gdp                 # govt only — household/corporate n/a free
    dsr_signal: null                        # no free EA debt-service series (wishlist)
    real_rate:
      nominal_signal: policy.fed_funds_target   # ECB policy rate binding
      inflation_signal: inflation.cpi_headline  # deflate: nominal − CPI yoy
    real_growth_signal: master.gdp_real
    ngdp_minus_yield:
      derived: true                         # (real g + CPI yoy)×100 − 10y yield
      yield_signal: policy.yield_10y
      growth_signal: master.gdp_real
      inflation_signal: inflation.cpi_headline
  KR:
    debt_components:
      - credit.gov_debt_gdp
    dsr_signal: null                        # BIS DSR needs manual load (wishlist)
    real_rate:
      nominal_signal: policy.yield_10y      # PROXY: no free BoK base-rate series
      inflation_signal: inflation.cpi_headline
      is_proxy: true
    real_growth_signal: master.gdp_real
    ngdp_minus_yield:
      derived: true
      yield_signal: policy.yield_10y
      growth_signal: master.gdp_real
      inflation_signal: inflation.cpi_headline
  JP:
    debt_components:
      - credit.gov_debt_gdp                 # ~250% of GDP — the defining input
    dsr_signal: null                        # BIS DSR needs manual load (wishlist)
    real_rate:
      nominal_signal: policy.yield_10y      # PROXY: 10y JGB minus annual CPI bridge
      inflation_signal: inflation.cpi_imf_annual
      is_proxy: true
    real_growth_signal: master.gdp_real
    ngdp_minus_yield:
      derived: true
      yield_signal: policy.yield_10y
      growth_signal: master.gdp_real
      inflation_signal: inflation.cpi_imf_annual
  GB:
    debt_components:
      - credit.gov_debt_gdp
    dsr_signal: null                        # BIS DSR needs manual load (wishlist)
    real_rate:
      nominal_signal: policy.yield_10y      # PROXY: 10y gilt minus monthly CPI
      inflation_signal: inflation.cpi_headline
      is_proxy: true
    real_growth_signal: master.gdp_real
    ngdp_minus_yield:
      derived: true
      yield_signal: policy.yield_10y
      growth_signal: master.gdp_real
      inflation_signal: inflation.cpi_headline
  CN:
    # Second country (after the US) with full sector-level debt data — BIS
    # household + corporate credit are quarterly and live, so CN gets a real
    # private/sovereign two-vote split. Caveats: no free bond yield at any
    # maturity → the 3m interbank rate proxies "the yield" in both spreads
    # (understates long rates when the curve is steep — documented proxy);
    # no debt-service series; CPI = IMF annual bridge (monthly feed dead).
    debt_components:
      - credit.gov_debt_gdp
      - credit.household_debt_gdp
      - credit.corporate_debt_gdp
    dsr_signal: null                        # BIS DSR needs manual load (wishlist)
    real_rate:
      nominal_signal: policy.rate_3m_interbank  # PROXY: only free CN market rate
      inflation_signal: inflation.cpi_imf_annual
      is_proxy: true
    real_growth_signal: master.gdp_real
    ngdp_minus_yield:
      derived: true
      yield_signal: policy.rate_3m_interbank    # PROXY: no free CN bond yield
      growth_signal: master.gdp_real
      inflation_signal: inflation.cpi_imf_annual

# ── Sovereign-aware sector model (Ray ruling 2026-07-06) ─────────────────────
# Triggered by the "US reads reflation while Ray calls for deleveraging"
# challenge: the private sector's post-2008 deleveraging was masking the
# sovereign. Rulings (full session in ray_dalio_review_log.md):
#   Q1/Q5 — TWO stage votes (private + sovereign), headline = the WORSE of
#           the two by stress severity, plus a separate SOVEREIGN SQUEEZE flag
#   Q2   — debt stock = size-weighted mean of sector percentiles, each
#           sector's percentile CAPPED at percentile_cap ("worst-of without
#           total dilution")
#   Q3   — service z = 0.70 × household DSR + 0.30 × government interest/GDP
#   Q4   — refinancing gap (marginal rate − effective rate on the stock) is a
#           pre-interest-bill squeeze trigger: when it exceeds the threshold,
#           the sovereign vote treats debt service as tightening one quarter
#           EARLY (the squeeze arriving on a schedule)
sector_model:
  percentile_cap: 0.90        # TUNABLE — Ray: cap each sector's percentile
  service_weights:            # TUNABLE — Ray's 70/30 split
    household: 0.70
    government: 0.30
  refinancing_gap_threshold: 0.75   # pp — TUNABLE; Ray: 0.5 in high-inflation regimes
  sovereign_flag:             # ANY condition fires the SOVEREIGN SQUEEZE flag
    refinancing_gap: 0.75     # pp, marginal − effective
    gov_interest_z: 1.5       # expanding Z of gov interest / GDP
    gov_dsr_z: 1.0            # expanding Z of gov interest / gov revenue
  # Severity ranking for the worst-of headline (higher = worse stress)
  severity: {squeeze: 3, deleveraging: 2, reflation: 1, leveraging: 0}

# Per-country sovereign inputs (concept tails; missing entries degrade
# honestly — the sovereign vote runs on whatever exists).
sovereign_inputs:
  US:
    gov_debt: credit.gov_debt_gdp
    private_debt: [credit.household_debt_gdp, credit.corporate_debt_gdp]
    gov_interest: fiscal.interest_payments     # $M annual (FYOINT)
    gdp_level: master.gdp_level_bn             # $B
    gov_revenue: fiscal.govt_revenue_gdp       # % GDP → GovDSR = interest% / revenue%
    marginal_yields: [policy.yield_2y, policy.yield_10y]
  EZ:
    gov_debt: credit.gov_debt_gdp
    private_debt: []
    marginal_yields: [policy.yield_10y]
  GB:
    gov_debt: credit.gov_debt_gdp
    private_debt: []
    marginal_yields: [policy.yield_10y]
  JP:
    gov_debt: credit.gov_debt_gdp
    private_debt: []
    marginal_yields: [policy.yield_10y]
  KR:
    gov_debt: credit.gov_debt_gdp
    private_debt: []
    marginal_yields: [policy.yield_10y]
  CN:
    gov_debt: credit.gov_debt_gdp
    private_debt: [credit.household_debt_gdp, credit.corporate_debt_gdp]
    # No gov_interest / gov_revenue interest series free for CN → the
    # refinancing-gap and gov-DSR flag conditions can't evaluate; the
    # SOVEREIGN SQUEEZE flag degrades honestly to never firing.
    marginal_yields: [policy.rate_3m_interbank]
