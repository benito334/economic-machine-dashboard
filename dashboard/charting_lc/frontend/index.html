<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indicators Machine — Charts</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1d2e;
      --bg2:      #20253a;
      --bg3:      #2a2f47;
      --border:   #363c58;
      --text:     #c9d1e0;
      --dim:      #5a6380;
      --accent:   #4c9be8;
      --green:    #34d399;
      --red:      #f87171;
      --orange:   #fb923c;
      --purple:   #a78bfa;
      --yellow:   #fbbf24;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; overflow: hidden; }

    /* ── App shell ─────────────────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ────────────────────────────────────────────────────────── */
    #hdr {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 42px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #logo { font-size: 13px; font-weight: 700; color: var(--accent);
      white-space: nowrap; margin-right: 8px; }

    .tab-btn {
      background: none; border: none; color: var(--dim);
      cursor: pointer; padding: 5px 11px; border-radius: 4px;
      font-size: 12.5px; transition: color .12s, background .12s;
    }
    .tab-btn:hover { background: var(--bg3); color: var(--text); }
    .tab-btn.active {
      background: var(--bg3); color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }

    /* ── Body ───────────────────────────────────────────────────────────── */
    #body { flex: 1; overflow: hidden; display: flex; }
    .tab { display: none; width: 100%; height: 100%; }
    .tab.active { display: flex; }

    /* ── CHARTS TAB ─────────────────────────────────────────────────────── */
    #t-charts { flex-direction: row; }

    #sidebar {
      width: 210px; min-width: 160px; flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 10px 6px;
    }

    .sb-label {
      font-size: 9.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--dim);
      padding: 4px 4px 5px; display: block;
    }
    .sb-section { margin-bottom: 10px; }

    .btn-row { display: flex; flex-wrap: wrap; gap: 3px; padding: 0 3px; }
    .pill {
      background: var(--bg3); border: 1px solid var(--border); color: var(--dim);
      cursor: pointer; padding: 2px 7px; border-radius: 3px; font-size: 11px;
    }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .grp-hdr {
      font-size: 10px; font-weight: 700; color: var(--dim);
      text-transform: uppercase; letter-spacing: .05em;
      padding: 5px 4px 2px; cursor: default;
    }
    .ser-row {
      display: flex; align-items: center; gap: 5px;
      padding: 2px 3px; border-radius: 3px; cursor: pointer;
    }
    .ser-row:hover { background: var(--bg3); }
    .ser-row input[type=checkbox] { cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
    .ser-row label { cursor: pointer; font-size: 11.5px; line-height: 1.4; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    #chart-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .pane-wrap { position: relative; border-bottom: 1px solid var(--border); }
    .pane-lbl {
      position: absolute; top: 5px; left: 9px; z-index: 10;
      font-size: 9.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--dim); pointer-events: none;
    }
    .empty-chart {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--dim); font-size: 14px;
    }

    /* ── MACRO TABLE TAB ────────────────────────────────────────────────── */
    #t-macro { flex-direction: column; overflow: hidden; }

    #macro-bar {
      padding: 7px 14px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap;
    }
    #macro-search {
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      padding: 4px 10px; border-radius: 4px; font-size: 12px; outline: none; width: 170px;
    }
    #force-pills { display: flex; gap: 4px; flex-wrap: wrap; }

    #macro-wrap { flex: 1; overflow: auto; }

    table.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
    table.tbl th {
      position: sticky; top: 0; background: var(--bg2);
      color: var(--dim); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em;
      padding: 6px 11px; text-align: left;
      border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    table.tbl th:hover { color: var(--text); }
    table.tbl td { padding: 4px 11px; border-bottom: 1px solid #1e2235; vertical-align: middle; white-space: nowrap; }
    table.tbl tr:hover td { background: var(--bg3); }

    .up   { color: var(--green); }
    .dn   { color: var(--red); }
    .flat { color: var(--dim); }

    .zbar-wrap { display: inline-flex; align-items: center; gap: 5px; }
    .zbar { width: 50px; height: 4px; background: var(--bg3); border-radius: 2px; position: relative; overflow: hidden; }
    .zbar-fill { position: absolute; top: 0; height: 100%; border-radius: 2px; }

    .bdg {
      font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px; margin-left: 3px;
    }
    .bdg-stale { background: #5c2e00; color: var(--orange); }
    .bdg-proxy { background: #152a4a; color: #60a5fa; }

    /* ── REGIME TAB ─────────────────────────────────────────────────────── */
    #t-regime { flex-direction: column; overflow: hidden; }

    #regime-bar {
      padding: 7px 14px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 18px; flex-shrink: 0; flex-wrap: wrap;
    }
    #regime-stats { display: flex; gap: 18px; align-items: center; }
    .rstat .val { font-size: 17px; font-weight: 700; line-height: 1.1; }
    .rstat .lbl { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; }

    #step-ctrls { display: flex; align-items: center; gap: 7px; margin-left: auto; }
    .step-btn {
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .step-btn:hover { background: var(--border); }
    .step-btn:disabled { opacity: .35; cursor: default; }
    #play-btn {
      background: var(--accent); border: none; color: #fff;
      padding: 3px 11px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #step-date { font-size: 12px; color: var(--dim); min-width: 84px; text-align: center; }

    #regime-charts-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── YIELD CURVE TAB ────────────────────────────────────────────────── */
    #t-yield { flex-direction: column; overflow: hidden; }

    #yield-bar {
      padding: 7px 14px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    #yield-date {
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      padding: 4px 10px; border-radius: 4px; font-size: 12px; outline: none;
    }
    #yield-msg { font-size: 11.5px; color: var(--dim); }

    #yield-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; overflow: auto; }

    .yc-chart { width: 100%; max-width: 820px; }
    .yc-grid { display: grid; align-items: end; gap: 12px; height: 280px; padding-bottom: 24px; position: relative; }
    .yc-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .yc-bar { width: 44px; border-radius: 4px 4px 0 0; background: var(--accent); opacity: .85; transition: opacity .15s; }
    .yc-bar:hover { opacity: 1; }
    .yc-val { font-size: 11.5px; font-weight: 600; color: var(--text); }
    .yc-lbl { font-size: 10px; color: var(--dim); }
    .yc-hline {
      position: absolute; left: 0; right: 0; height: 1px; background: var(--border);
      pointer-events: none;
    }
    .yc-hlbl {
      position: absolute; left: -32px; font-size: 9.5px; color: var(--dim);
      transform: translateY(50%);
    }
    .yield-table { width: 100%; max-width: 420px; margin-left: 32px; }
    table.yt { border-collapse: collapse; width: 100%; font-size: 13px; }
    table.yt th { color: var(--dim); font-size: 10px; font-weight: 700; text-transform: uppercase;
      padding: 4px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    table.yt td { padding: 5px 12px; border-bottom: 1px solid #1e2235; }

    /* ── Shared ─────────────────────────────────────────────────────────── */
    .loading { display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--dim); font-size: 13px; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="hdr">
    <div id="logo">⚡ Indicators Machine</div>
    <button class="tab-btn active" data-tab="charts">📈 Charts</button>
    <button class="tab-btn" data-tab="macro">📊 Macro Table</button>
    <button class="tab-btn" data-tab="regime">🔄 Regime</button>
    <button class="tab-btn" data-tab="yield">📉 Yield Curve</button>
  </div>

  <div id="body">

    <!-- ── CHARTS TAB ──────────────────────────────────────────────────── -->
    <div class="tab active" id="t-charts">
      <div id="sidebar">
        <div class="sb-section">
          <span class="sb-label">Horizon</span>
          <div class="btn-row" id="horizon-btns">
            <button class="pill" data-h="1Y">1Y</button>
            <button class="pill" data-h="3Y">3Y</button>
            <button class="pill active" data-h="5Y">5Y</button>
            <button class="pill" data-h="10Y">10Y</button>
            <button class="pill" data-h="MAX">MAX</button>
          </div>
        </div>
        <div class="sb-section">
          <span class="sb-label">View</span>
          <div class="btn-row" id="mode-btns">
            <button class="pill active" data-m="value">Value</button>
            <button class="pill" data-m="zscore">Z-Score</button>
          </div>
        </div>
        <div class="sb-section">
          <span class="sb-label">Series</span>
          <div id="series-list"></div>
        </div>
      </div>
      <div id="chart-area">
        <div class="empty-chart" id="charts-empty">Loading catalog…</div>
      </div>
    </div>

    <!-- ── MACRO TABLE TAB ─────────────────────────────────────────────── -->
    <div class="tab" id="t-macro">
      <div id="macro-bar">
        <input type="text" id="macro-search" placeholder="Search indicators…" />
        <div id="force-pills"></div>
      </div>
      <div id="macro-wrap">
        <div class="loading" id="macro-loading">Loading snapshot…</div>
      </div>
    </div>

    <!-- ── REGIME TAB ──────────────────────────────────────────────────── -->
    <div class="tab" id="t-regime">
      <div id="regime-bar">
        <div id="regime-stats">
          <div class="rstat"><div class="val" id="rs-q">—</div><div class="lbl">Regime</div></div>
          <div class="rstat"><div class="val" id="rs-g">—</div><div class="lbl">Growth Z</div></div>
          <div class="rstat"><div class="val" id="rs-i">—</div><div class="lbl">Inflation Z</div></div>
          <div class="rstat"><div class="val" id="rs-gm">—</div><div class="lbl">Growth Mom</div></div>
          <div class="rstat"><div class="val" id="rs-im">—</div><div class="lbl">Infl Mom</div></div>
          <div class="rstat"><div class="val" id="rs-c">—</div><div class="lbl">Confidence</div></div>
        </div>
        <div id="step-ctrls">
          <button class="step-btn" id="btn-first">⏮</button>
          <button class="step-btn" id="btn-prev">‹</button>
          <span id="step-date">—</span>
          <button class="step-btn" id="btn-next">›</button>
          <button class="step-btn" id="btn-last">⏭</button>
          <button id="play-btn">▶ Play</button>
        </div>
      </div>
      <div id="regime-charts-wrap">
        <div class="loading" id="regime-loading">Loading regime history…</div>
      </div>
    </div>

    <!-- ── YIELD CURVE TAB ─────────────────────────────────────────────── -->
    <div class="tab" id="t-yield">
      <div id="yield-bar">
        <label style="color:var(--dim);font-size:12px">Date</label>
        <input type="date" id="yield-date" />
        <button class="pill active" id="yield-btn" style="padding:4px 12px">Load</button>
        <span id="yield-msg"></span>
      </div>
      <div id="yield-body">
        <div class="loading" id="yield-empty">Select a date and click Load</div>
        <div style="display:none;width:100%;max-width:900px" id="yield-content">
          <div style="display:flex;gap:32px;align-items:flex-start">
            <div class="yc-chart" id="yc-bars"></div>
            <div class="yield-table" id="yc-table"></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- #body -->
</div><!-- #app -->

<script>
'use strict';

// ── API base: /api via nginx reverse-proxy; override with ?api= for local dev ──
const API = new URLSearchParams(location.search).get('api') || '/api';

// ── Palette ───────────────────────────────────────────────────────────────────
const COLORS = ['#4c9be8','#34d399','#f87171','#fb923c','#a78bfa',
                '#fbbf24','#ec4899','#60a5fa','#6ee7b7','#fca5a5',
                '#818cf8','#f9a8d4','#86efac','#fdba74','#c4b5fd'];

const Q_COLORS = {
  'Expansion':               '#34d399',
  'Inflationary Boom':       '#fbbf24',
  'Disinflationary Slowdown':'#60a5fa',
  'Stagflation':             '#f87171',
};

// ── State ─────────────────────────────────────────────────────────────────────
let catalog   = [];
let horizon   = '5Y';
let viewMode  = 'value';
let selected  = new Set(['us.master.gdp_real','us.inflation.pce_core','us.policy.fed_funds']);

// charts-tab panes
let panes = {};          // paneId → { div, chart, series:{signalId→LineSeries} }

// macro-tab
let snapshot  = [];
let macroSort = { col: 'force', dir: 1 };
let macroForce = null;

// regime-tab
let regHist   = [];
let regStep   = 0;
let playTimer = null;
let regCharts = [];      // [{chart, line, key, paneId}]

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`${r.status} ${path}`);
  return r.json();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function startDate() {
  if (horizon === 'MAX') return null;
  const y = {'1Y':1,'3Y':3,'5Y':5,'10Y':10}[horizon];
  const d = new Date();
  d.setFullYear(d.getFullYear() - y);
  return d.toISOString().split('T')[0];
}

function fmt(v, d = 2) {
  if (v === null || v === undefined) return '—';
  return Number(v).toFixed(d);
}

function pctFmt(v) {
  if (v === null || v === undefined) return '—';
  return (Number(v) * 100).toFixed(0) + '%';
}

function dirHtml(d) {
  if (d === 'rising')  return '<span class="up">↑</span>';
  if (d === 'falling') return '<span class="dn">↓</span>';
  return '<span class="flat">→</span>';
}

function zHtml(z) {
  if (z === null || z === undefined) return '—';
  const cls = z > 0.5 ? 'up' : z < -0.5 ? 'dn' : 'flat';
  const pct = Math.min(Math.abs(z) / 4 * 100, 100);
  const col = z > 0 ? 'var(--green)' : 'var(--red)';
  const left = z < 0 ? `${50 - pct/2}%` : '50%';
  return `<span class="${cls}">${fmt(z)}</span>
    <span class="zbar-wrap"><span class="zbar">
      <span class="zbar-fill" style="left:${left};width:${pct/2}%;background:${col}"></span>
    </span></span>`;
}

const LC_OPTS = (h) => ({
  layout:  { background: { color: '#1a1d2e' }, textColor: '#5a6380', fontSize: 11 },
  grid:    { vertLines: { color: '#252a40' }, horzLines: { color: '#252a40' } },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  timeScale: { borderColor: '#363c58', timeVisible: true },
  rightPriceScale: { borderColor: '#363c58' },
  height: h,
});

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn =>
  btn.addEventListener('click', () => activateTab(btn.dataset.tab))
);

function activateTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === `t-${name}`));
  if (name === 'charts') initCharts();
  if (name === 'macro')  initMacro();
  if (name === 'regime') initRegime();
  if (name === 'yield')  initYield();
}

// ── CHARTS TAB ────────────────────────────────────────────────────────────────
async function initCharts() {
  if (catalog.length === 0) {
    try { catalog = await api('/catalog'); } catch(e) { console.error(e); return; }
    buildSidebar();
    document.getElementById('charts-empty').style.display = 'none';
  }
  renderCharts();
}

function buildSidebar() {
  const groups = {};
  catalog.forEach((s, i) => {
    s._ci = i; // color index
    (groups[s.group] = groups[s.group] || []).push(s);
  });
  const el = document.getElementById('series-list');
  el.innerHTML = '';
  Object.entries(groups).forEach(([g, items]) => {
    const gd = document.createElement('div');
    gd.innerHTML = `<div class="grp-hdr">${g}</div>`;
    items.forEach(s => {
      const color = COLORS[s._ci % COLORS.length];
      const chk = selected.has(s.signal_id) ? 'checked' : '';
      const row = document.createElement('div');
      row.className = 'ser-row';
      row.innerHTML =
        `<span class="dot" style="background:${color}"></span>
         <input type="checkbox" id="c-${s.signal_id}" ${chk}/>
         <label for="c-${s.signal_id}" title="${s.description}">${s.label}</label>`;
      row.querySelector('input').addEventListener('change', e => {
        if (e.target.checked) selected.add(s.signal_id);
        else selected.delete(s.signal_id);
        renderCharts();
      });
      gd.appendChild(row);
    });
    el.appendChild(gd);
  });
}

async function renderCharts() {
  const area = document.getElementById('chart-area');

  // Group selected series by default_pane
  const byPane = {};
  catalog.forEach(s => {
    if (!selected.has(s.signal_id)) return;
    const pane = s.default_pane || 'main';
    (byPane[pane] = byPane[pane] || []).push(s);
  });

  const paneOrder = ['growth','inflation','policy','credit','fiscal','external','main'];
  const ordered = paneOrder.filter(p => byPane[p])
    .concat(Object.keys(byPane).filter(p => !paneOrder.includes(p)));

  if (ordered.length === 0) {
    area.innerHTML = '<div class="empty-chart">Select series from the sidebar</div>';
    Object.values(panes).forEach(p => p.chart.remove());
    panes = {};
    return;
  }

  // Remove panes no longer needed
  Object.keys(panes).forEach(pid => {
    if (!byPane[pid]) { panes[pid].chart.remove(); delete panes[pid]; }
  });
  area.querySelectorAll('.pane-wrap').forEach(d => {
    if (!byPane[d.dataset.pid]) d.remove();
  });

  const totalH = area.clientHeight;
  const paneH = Math.max(60, Math.floor(totalH / ordered.length));
  const start = startDate();

  for (const pid of ordered) {
    const items = byPane[pid];
    let wrap = area.querySelector(`.pane-wrap[data-pid="${pid}"]`);
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.className = 'pane-wrap';
      wrap.dataset.pid = pid;
      wrap.innerHTML = `<div class="pane-lbl">${pid}</div>`;
      area.appendChild(wrap);
    }
    wrap.style.height = `${paneH}px`;

    if (!panes[pid]) {
      const chart = LightweightCharts.createChart(wrap, { ...LC_OPTS(paneH), width: area.clientWidth });
      panes[pid] = { div: wrap, chart, series: {} };
    } else {
      panes[pid].chart.resize(area.clientWidth, paneH);
    }

    const { chart, series } = panes[pid];
    const needed = new Set(items.map(s => s.signal_id));
    Object.keys(series).forEach(id => { if (!needed.has(id)) { chart.removeSeries(series[id]); delete series[id]; } });

    for (const s of items) {
      const col = viewMode === 'zscore' ? 'zscore' : (s.value_col || 'value');
      const qs  = `?col=${col}` + (start ? `&start=${start}` : '');
      try {
        const data = await api(`/series/${encodeURIComponent(s.signal_id)}${qs}`);
        if (!data.length) continue;
        const color = COLORS[s._ci % COLORS.length];
        if (!series[s.signal_id]) {
          const line = chart.addLineSeries({
            color, lineWidth: 1.5, title: s.label,
            priceScaleId: viewMode === 'zscore' ? 'right' : s.signal_id,
            lastValueVisible: true, priceLineVisible: false,
          });
          series[s.signal_id] = line;
        }
        series[s.signal_id].setData(data);
      } catch(e) { console.warn('series load failed', s.signal_id, e); }
    }

    start
      ? chart.timeScale().setVisibleRange({ from: start, to: new Date().toISOString().split('T')[0] })
      : chart.timeScale().fitContent();
  }

  syncPaneScales(ordered);
}

function syncPaneScales(pids) {
  if (pids.length < 2) return;
  const charts = pids.map(p => panes[p]?.chart).filter(Boolean);
  let syncing = false;
  charts.forEach((c, i) => {
    c.timeScale().subscribeVisibleTimeRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      charts.forEach((o, j) => { if (i !== j) try { o.timeScale().setVisibleRange(range); } catch(_){} });
      syncing = false;
    });
  });
}

// Horizon + mode controls
document.querySelectorAll('#horizon-btns .pill').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('#horizon-btns .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    horizon = btn.dataset.h;
    if (document.getElementById('t-charts').classList.contains('active')) renderCharts();
  })
);

document.querySelectorAll('#mode-btns .pill').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('#mode-btns .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    viewMode = btn.dataset.m;
    // destroy all panes so they rebuild with new value column
    Object.values(panes).forEach(p => p.chart.remove());
    panes = {};
    document.getElementById('chart-area').innerHTML = '';
    renderCharts();
  })
);

// ── MACRO TABLE TAB ───────────────────────────────────────────────────────────
async function initMacro() {
  if (snapshot.length) { renderMacro(); return; }
  try {
    snapshot = await api('/signals/snapshot');
    buildForcePills();
    document.getElementById('macro-loading').style.display = 'none';
    renderMacro();
  } catch(e) {
    document.getElementById('macro-loading').textContent = 'Failed to load snapshot';
  }
}

function buildForcePills() {
  const forces = [...new Set(snapshot.map(r => r.force))].sort();
  const fp = document.getElementById('force-pills');
  fp.innerHTML = '';
  const all = mkPill('All', null, true);
  fp.appendChild(all);
  forces.forEach(f => fp.appendChild(mkPill(f.charAt(0).toUpperCase()+f.slice(1), f, false)));
}

function mkPill(label, force, active) {
  const b = document.createElement('button');
  b.className = 'pill' + (active ? ' active' : '');
  b.textContent = label;
  b.dataset.force = force || '';
  b.onclick = () => {
    macroForce = force;
    document.querySelectorAll('#force-pills .pill').forEach(p =>
      p.classList.toggle('active', p.dataset.force === (force || ''))
    );
    renderMacro();
  };
  return b;
}

document.getElementById('macro-search').addEventListener('input', () => {
  if (snapshot.length) renderMacro();
});

function renderMacro() {
  const search = document.getElementById('macro-search').value.toLowerCase();
  let rows = snapshot.filter(r => {
    if (macroForce && r.force !== macroForce) return false;
    if (search && !r.label.toLowerCase().includes(search) && !r.id.toLowerCase().includes(search)) return false;
    return true;
  });

  rows = [...rows].sort((a, b) => {
    let av = a[macroSort.col], bv = b[macroSort.col];
    if (av === null || av === undefined) av = macroSort.dir < 0 ? 1e99 : -1e99;
    if (bv === null || bv === undefined) bv = macroSort.dir < 0 ? 1e99 : -1e99;
    if (typeof av === 'string') return macroSort.dir * av.localeCompare(bv);
    return macroSort.dir * (av - bv);
  });

  const cols = [
    { k:'force',       t:'Force',    fn: r => r.force },
    { k:'label',       t:'Indicator',fn: r => `<span title="${r.description}">${r.label}</span>` },
    { k:'as_of',       t:'Updated',  fn: r => r.as_of || '—' },
    { k:'value',       t:'Value',    fn: r => fmt(r.value, 3) },
    { k:'units',       t:'Units',    fn: r => r.units },
    { k:'direction',   t:'Dir',      fn: r => dirHtml(r.direction) },
    { k:'change_1m',   t:'1M Δ',     fn: r => fmt(r.change_1m, 4) },
    { k:'change_3m',   t:'3M Δ',     fn: r => fmt(r.change_3m, 4) },
    { k:'change_12m',  t:'12M Δ',    fn: r => fmt(r.change_12m, 4) },
    { k:'zscore',      t:'Z-Score',  fn: r => zHtml(r.zscore) },
    { k:'level_percentile', t:'Pct', fn: r => r.level_percentile !== null
        ? Math.round(r.level_percentile * 100) + '%' : '—' },
    { k:'momentum_percentile', t:'Mom Pct', fn: r => r.momentum_percentile !== null
        ? Math.round(r.momentum_percentile * 100) + '%' : '—' },
    { k:'flags', t:'', fn: r =>
        (r.is_stale  ? '<span class="bdg bdg-stale">STALE</span>' : '') +
        (r.is_proxy  ? '<span class="bdg bdg-proxy">PROXY</span>'  : '') },
  ];

  const si = c => macroSort.col === c.k ? (macroSort.dir > 0 ? ' ↑' : ' ↓') : '';
  const thead = `<tr>${cols.map(c => `<th data-k="${c.k}">${c.t}${si(c)}</th>`).join('')}</tr>`;
  const tbody = rows.map(r =>
    `<tr title="${r.linkage}">${cols.map(c => `<td>${c.fn(r)}</td>`).join('')}</tr>`
  ).join('');

  const wrap = document.getElementById('macro-wrap');
  wrap.innerHTML = `<table class="tbl"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  wrap.querySelectorAll('th[data-k]').forEach(th =>
    th.addEventListener('click', () => {
      if (macroSort.col === th.dataset.k) macroSort.dir *= -1;
      else { macroSort.col = th.dataset.k; macroSort.dir = 1; }
      renderMacro();
    })
  );
}

// ── REGIME TAB ────────────────────────────────────────────────────────────────
async function initRegime() {
  if (regHist.length) { updateStep(); return; }
  try {
    regHist = await api('/composite-history');
    regStep = regHist.length - 1;
    document.getElementById('regime-loading').style.display = 'none';
    buildRegimeCharts();
    updateStep();
  } catch(e) {
    document.getElementById('regime-loading').textContent = 'Failed to load history';
  }
}

function buildRegimeCharts() {
  const wrap = document.getElementById('regime-charts-wrap');
  wrap.innerHTML = '';
  regCharts = [];

  const pCfgs = [
    { pid:'g-score',  title:'Growth Score',      key:'growth_score',      color:'#34d399', hPct:25, isMom:false },
    { pid:'g-mom',    title:'Growth Momentum %',  key:'growth_momentum',   color:'#86efac', hPct:15, isMom:true  },
    { pid:'i-score',  title:'Inflation Score',    key:'inflation_score',   color:'#f87171', hPct:25, isMom:false },
    { pid:'i-mom',    title:'Infl. Momentum %',   key:'inflation_momentum',color:'#fca5a5', hPct:15, isMom:true  },
  ];
  const totalPct = pCfgs.reduce((s, p) => s + p.hPct, 0);
  const totalH = wrap.clientHeight || 480;

  pCfgs.forEach(cfg => {
    const h = Math.floor(cfg.hPct / totalPct * totalH);
    const div = document.createElement('div');
    div.className = 'pane-wrap';
    div.dataset.pid = cfg.pid;
    div.style.cssText = `height:${h}px; width:100%`;
    div.innerHTML = `<div class="pane-lbl">${cfg.title}</div>`;
    wrap.appendChild(div);

    const chart = LightweightCharts.createChart(div, {
      ...LC_OPTS(h), width: wrap.clientWidth,
      handleScroll: false, handleScale: false,
    });

    const line = chart.addLineSeries({
      color: cfg.color, lineWidth: 1.5,
      priceScaleId: 'right', lastValueVisible: false, priceLineVisible: false,
    });

    const data = regHist
      .map(r => ({ time: r.time, value: cfg.isMom && r[cfg.key] !== null ? r[cfg.key] * 100 : r[cfg.key] }))
      .filter(d => d.value !== null && d.value !== undefined);

    line.setData(data);

    if (cfg.isMom) {
      // 50% reference line
      const ref = chart.addLineSeries({
        color: '#363c58', lineWidth: 1,
        lineStyle: LightweightCharts.LineStyle.Dashed,
        priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
      });
      ref.setData(data.map(d => ({ time: d.time, value: 50 })));
    }

    chart.timeScale().fitContent();
    regCharts.push({ chart, line, key: cfg.key, paneId: cfg.pid, isMom: cfg.isMom });
  });

  // sync time scales across regime panes
  let rSyncing = false;
  regCharts.forEach((rc, i) => {
    rc.chart.timeScale().subscribeVisibleTimeRangeChange(range => {
      if (rSyncing || !range) return;
      rSyncing = true;
      regCharts.forEach((o, j) => { if (i !== j) try { o.chart.timeScale().setVisibleRange(range); } catch(_){} });
      rSyncing = false;
    });
  });
}

function updateStep() {
  if (!regHist.length) return;
  const idx = Math.max(0, Math.min(regStep, regHist.length - 1));
  const r = regHist[idx];

  // Info strip
  const q = r.quadrant || '—';
  const qCol = Q_COLORS[q] || 'var(--text)';
  const gs = el => document.getElementById(el);
  gs('rs-q').textContent = q; gs('rs-q').style.color = qCol;
  gs('rs-g').textContent = fmt(r.growth_score);
  gs('rs-g').style.color = (r.growth_score > 0) ? 'var(--green)' : 'var(--red)';
  gs('rs-i').textContent = fmt(r.inflation_score);
  gs('rs-i').style.color = (r.inflation_score > 0) ? 'var(--red)' : 'var(--green)';
  gs('rs-gm').textContent = pctFmt(r.growth_momentum);
  gs('rs-im').textContent = pctFmt(r.inflation_momentum);
  gs('rs-c').textContent  = pctFmt(r.confidence);
  gs('step-date').textContent = r.time;

  // Step button states
  gs('btn-first').disabled = idx === 0;
  gs('btn-prev').disabled  = idx === 0;
  gs('btn-next').disabled  = idx === regHist.length - 1;
  gs('btn-last').disabled  = idx === regHist.length - 1;

  // Center visible range on the step (±24 months context)
  const fromIdx = Math.max(0, idx - 24);
  const toIdx   = Math.min(regHist.length - 1, idx + 12);
  const range = { from: regHist[fromIdx].time, to: regHist[toIdx].time };
  regCharts.forEach(rc => { try { rc.chart.timeScale().setVisibleRange(range); } catch(_){} });

  // Add a marker at the current step position on the first chart
  if (regCharts.length > 0) {
    regCharts.forEach(rc => {
      rc.line.setMarkers([{
        time: r.time,
        position: 'inBar',
        color: '#ffffff44',
        shape: 'arrowUp',
        text: '',
        size: 0.1,
      }]);
    });
  }
}

// Step controls
document.getElementById('btn-first').onclick = () => { regStep = 0; updateStep(); };
document.getElementById('btn-prev').onclick  = () => { if (regStep > 0) { regStep--; updateStep(); } };
document.getElementById('btn-next').onclick  = () => { if (regStep < regHist.length-1) { regStep++; updateStep(); } };
document.getElementById('btn-last').onclick  = () => { regStep = regHist.length-1; updateStep(); };

document.getElementById('play-btn').onclick = () => {
  if (playTimer) {
    clearInterval(playTimer); playTimer = null;
    document.getElementById('play-btn').textContent = '▶ Play';
    return;
  }
  if (regStep >= regHist.length - 1) regStep = 0;
  document.getElementById('play-btn').textContent = '⏸ Pause';
  playTimer = setInterval(() => {
    if (regStep >= regHist.length - 1) {
      clearInterval(playTimer); playTimer = null;
      document.getElementById('play-btn').textContent = '▶ Play';
      return;
    }
    regStep++;
    updateStep();
  }, 100);
};

document.addEventListener('keydown', e => {
  if (!document.getElementById('t-regime').classList.contains('active')) return;
  if (e.key === 'ArrowLeft')  document.getElementById('btn-prev').click();
  if (e.key === 'ArrowRight') document.getElementById('btn-next').click();
  if (e.key === ' ') { e.preventDefault(); document.getElementById('play-btn').click(); }
});

// ── YIELD CURVE TAB ───────────────────────────────────────────────────────────
function initYield() {
  const inp = document.getElementById('yield-date');
  if (!inp.value) inp.value = new Date().toISOString().split('T')[0];
}

document.getElementById('yield-btn').addEventListener('click', loadYield);
document.getElementById('yield-date').addEventListener('keypress', e => { if (e.key==='Enter') loadYield(); });

async function loadYield() {
  const date = document.getElementById('yield-date').value;
  const msg  = document.getElementById('yield-msg');
  if (!date) return;
  msg.textContent = 'Loading…';
  try {
    const data = await api(`/yield-curve/${date}`);
    if (!data.length) { msg.textContent = 'No data for this date'; return; }
    msg.textContent = `${data.length} maturities · ${date}`;
    renderYield(data);
  } catch(e) {
    msg.textContent = 'Error loading curve';
  }
}

function renderYield(data) {
  const empty   = document.getElementById('yield-empty');
  const content = document.getElementById('yield-content');
  empty.style.display   = 'none';
  content.style.display = 'block';

  const maxY = Math.max(...data.map(d => d.yield_pct)) * 1.15;
  const chartH = 240;

  // Bar chart
  const barsHtml = data.map(d => {
    const h = Math.max(4, Math.round((d.yield_pct / maxY) * chartH));
    const color = d.yield_pct >= 0 ? 'var(--accent)' : 'var(--red)';
    return `<div class="yc-col">
      <div class="yc-val">${d.yield_pct.toFixed(2)}%</div>
      <div class="yc-bar" style="height:${h}px;background:${color}" title="${d.label}: ${d.yield_pct.toFixed(3)}%"></div>
      <div class="yc-lbl">${d.label}</div>
    </div>`;
  }).join('');

  document.getElementById('yc-bars').innerHTML =
    `<div class="yc-grid" style="grid-template-columns:repeat(${data.length},1fr);height:${chartH+48}px">
      ${barsHtml}
    </div>`;

  // Table
  const tbody = data.map(d =>
    `<tr><td>${d.label}</td><td>${d.maturity_years}y</td>
     <td style="font-weight:600;color:var(--accent)">${d.yield_pct.toFixed(3)}%</td></tr>`
  ).join('');
  document.getElementById('yc-table').innerHTML =
    `<table class="yt">
      <thead><tr><th>Maturity</th><th>Years</th><th>Yield</th></tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;
}

// ── Resize handling ───────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const area = document.getElementById('chart-area');
  const keys = Object.keys(panes);
  if (keys.length) {
    const h = Math.max(60, Math.floor(area.clientHeight / keys.length));
    keys.forEach(pid => {
      const p = panes[pid];
      if (p.div) p.div.style.height = `${h}px`;
      p.chart.resize(area.clientWidth, h);
    });
  }

  if (regCharts.length) {
    const wrap = document.getElementById('regime-charts-wrap');
    const pPcts = [25, 15, 25, 15];
    const total = pPcts.reduce((s, v) => s+v, 0);
    regCharts.forEach((rc, i) => {
      const h = Math.floor(pPcts[i] / total * wrap.clientHeight);
      const div = wrap.querySelector(`.pane-wrap[data-pid="${rc.paneId}"]`);
      if (div) div.style.height = `${h}px`;
      rc.chart.resize(wrap.clientWidth, h);
    });
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
activateTab('charts');
</script>
