x-common: &common
  build: .
  env_file: .env
  volumes:
    - /mnt/data/project_data/all_weather/indicators_machine:/data
    - /mnt/data/db/all_weather/indicators_machine:/db
  environment:
    DATA_DIR: /data
    DB_PATH: /db/signals.duckdb
    RAW_CACHE_DIR: /data/raw_cache
    SNAPSHOTS_DIR: /data/snapshots

services:
  pipeline:
    <<: *common
    command: python -m indicators.pipeline

  dashboard:
    <<: *common
    ports:
      - "8501:8501"
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0

  charting:
    <<: *common
    ports:
      - "8502:8502"
    environment:
      DATA_DIR: /data
      DB_PATH: /db/signals.duckdb
      RAW_CACHE_DIR: /data/raw_cache
      SNAPSHOTS_DIR: /data/snapshots
      CHARTING_PORT: "8502"
      DASH_DEBUG: "0"
    command: python -m dashboard.charting

  # ── TradingView Lightweight Charts system (ADR-007 Option B) ──────────────
  lc_api:
    <<: *common
    ports:
      - "8004:8000"
    command: uvicorn dashboard.charting_lc.main:app --host 0.0.0.0 --port 8000

  lc_frontend:
    build:
      context: .
      dockerfile: dashboard/charting_lc/Dockerfile.frontend
    ports:
      - "8503:80"
    depends_on:
      - lc_api
